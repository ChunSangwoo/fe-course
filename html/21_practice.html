<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>21번 실습 연습</title>
  </head>
  <body>
    <header></header>
    <main>
      <section>
        <h1>웹 개발 교육 상담 문의</h1>
        <p>
          HTML, CSS, JavaScript, React, 프론트엔드 교육 과정에 대해 궁금한
          내용을 남겨주세요. 담당자가 확인 후 안내해드립니다
        </p>
        <form action="#" method="post"></form>
        <fieldset>
          <legend>상담 신청 정보</legend>
          <div>
            <label for="name">이름<sup>*</sup></label>
            <input type="text" name="name" placeholder="이름을 입력해주세요." />
            <p>실명을 입력해주세요</p>
          </div>
          <div>
            <label for="email">이메일<sup>*</sup></label>
            <input type="text" name="email" placeholder="example@email.com" />
            <p>답변을 받을 이메일 주소를 입력해주세요.</p>
          </div>
          <div>
            <label for="phone">연락처</label>
            <input type="tel" name="phone" placeholder="010-0000-0000" />
          </div>
          <div>
            <label for="course">교육과정<sup>*</sup></label>
            <select name="course">
              <option value="선택">선택해주세요</option>
              <option value="선택">선택해주세요</option>
              <option value="선택">선택해주세요</option>
              <option value="선택">선택해주세요</option>
            </select>
          </div>
          <div>
            <label for="ask">문의 내용<sup>*</sup></label>
            <textarea
              name="ask"
              cols="50"
              rows="10"
              placeholder="궁금한 내용을 자세히 입력해 주세요."
            ></textarea>
          </div>
          <p>예:수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
          <input type="checkbox" name="agree" />
          <label for="agree"
            >개인정보 수집 및 이용에 동의합니다.<sup>*</sup></label
          >
          <button>상담 문의 보내기</button>
        </fieldset>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
