<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow Style</title>
    <style>
      .text {
        text-shadow: 10px 5px 0 rgb(97, 89, 89, 0.5);
      }
      .box {
        box-shadow: 10px 10px 5px 0 rgba(0, 0, 0, 0.7);
        width: 500px;
        height: 300px;
        background-color: aquamarine;
      }
    </style>
  </head>
  <body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-Shadow</h2>
    <h2 class="box">Box-Shadow</h2>
  </body>
</html>
