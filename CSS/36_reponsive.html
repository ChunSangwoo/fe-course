<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Style</title>
    <style>
      /* media query :: 0 ~ 600px 이상일 때 실행되는 CSS */
      @media screen and (max-width: 600px) {
        .wrapper {
          background-color: aquamarine;
        }
        .wrapper header {
          background-color: tomato;
          color: #fff;
          font-weight: 2rem;
        }
      }
      /* media query :: 1001px 이상일 때 실행되는 CSS */
      @media screen and (min-width: 1001px) {
        .wrapper {
          background-color: aquamarine;
        }
        /* .wrapper header {
          background-color: tomato;
          color: #fff;
          font-weight: 2rem;
        } */
        .wrapper main {
          background-color: blue;
          color: #fff;
          font-weight: 2rem;
        }
      }
      @media (min-width: 601px) and (max-width: 999px) {
        .wrapper {
          background-color: aquamarine;
        }
        .wrapper footer {
          background-color: yellow;
          color: #fff;
          font-weight: 2rem;
        }
        /* .wrapper main {
          background-color: blue;
          color: #fff;
          font-weight: 2rem;
        } */
        .header-menu {
          display: flex;
          gap: 10px;
          justify-content: center;
          border: 1px solid red;
          list-style-type: none;
          padding: 0;
          margin: 0;
        }
        .header-menu a {
          padding: 1rem 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <h1>Responsive Style :: 반응형</h1>
    <div class="wrapper">
      <header>Header</header>
      <nav>
        <ul class="header-menu">
          <li><a href="#">로그인</a></li>
          <li><a href="#">회원가입</a></li>
          <li><a href="#">공지사항</a></li>
          <li><a href="#">게시판</a></li>
          <li><a href="#">Q&A</a></li>
        </ul>
      </nav>
      <main>Main</main>
      <footer>Footer</footer>
    </div>
  </body>
</html>
