<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      header {
        border: 1px solid red;
        width: 1000px;
        margin: auto;
        display: flex;
        justify-content: space-between;
      }

      .header-menu-top ul,
      .header-menu-bottom ul {
        display: flex;
        list-style: none;
        /* border: 1px solid blue; */
        justify-content: right;
      }

      .header-menu-top ul {
        gap: 20px;
        font-size: 0.9rem;
      }

      .header-menu-bottom ul {
        gap: 20px;
      }

      .header-menu-top ul a {
        text-decoration: none;
        color: #666;
      }
      .header-menu-bottom ul a {
        text-decoration: none;
        color: #666;
      }

      .header-menu-bottom ul a {
        letter-spacing: 2px;
      }
      .header-menu-top li:last-child {
        border: 1px solid gray;
        border-radius: 4px;
        padding: 5px;
        background-color: white;
      }
      .header-menu-top li:last-child i {
        font-size: 1.5rem;
        font-weight: 700;
        background-color: white;
      }
      .header-menu-top li:last-child input {
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-logo">
        <img
          src="https://www.starbucks.co.kr/common/img/common/logo.png"
          alt=""
        />
      </div>
      <div class="header-menu">
        <nav class="header-menu-top">
          <ul>
            <li><a href="#">Sign In</a></li>
            <li><a href="#">My Starbucks</a></li>
            <li><a href="#">Customer Service & Ideas</a></li>
            <li><a href="#">Find a Store</a></li>
            <li>
              <input type="text" />
              <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
            </li>
          </ul>
        </nav>
        <nav class="header-menu-bottom">
          <ul>
            <li><a href="#"></a>COFFEE</li>
            <li><a href="#"></a>MENU</li>
            <li><a href="#"></a>STORE</li>
            <li><a href="#"></a>ESG</li>
            <li><a href="#"></a>STARBUCKS REWARDS</li>
            <li><a href="#"></a>CORPORATE SALES</li>
            <li><a href="#"></a>WHAT'S NEW</li>
          </ul>
        </nav>
      </div>
    </header>
  </body>
</html>
