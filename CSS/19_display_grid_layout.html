<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display-Grid Layout</title>
    <style>
      div {
        border: 1px solid aquamarine;
      }
      .grid-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr 2fr 1fr;
        gap: 10px;
        /* grid-template-columns: repeat(4, 1fr); */

        grid-template-rows: 100px auto;
        gap: 10px;

        align-items: center; /* 셀기준 세로 정렬 */
        justify-content: center; /* 셀기준 가로 정렬 */
      }
      .list-grid-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
      }

      img[alt="img1"],
      img[alt="img2"] {
        width: 300px;
        height: 300px;
      }
      img[alt="img3"] {
        width: 300px;
        height: 300px;
      }

      .item-grid {
        border: 1px solid blue;
        grid-column: span 3; /*컬럼 병합 : 1~3 */
      }
    </style>
  </head>
  <body>
    <h1>Display Grid Layout</h1>
    <div class="grid-wrap">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
      <div>7</div>
    </div>

    <ul class="list-grid-wrap">
      <li class="item-grid">
        <!-- 2행 2열 -->
        <img src="../images/img01_seo.png" alt="img1" />
      </li>
      <li><img src="../images/img01_seo.png" alt="img2" /></li>
      <li><img src="../images/Mad.jpg" alt="img3" /></li>
      <li><img src="../images/img01_seo.png" alt="img2" /></li>
      <li><img src="../images/Mad.jpg" alt="img3" /></li>
      <li><img src="../images/img01_seo.png" alt="img2" /></li>
      <li><img src="../images/Mad.jpg" alt="img3" /></li>
    </ul>
  </body>
</html>
